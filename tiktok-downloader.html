<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DARKAI TOOLS DOWNLOADER</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --card: #111111;
            --red: #ff0040;
            --red-dark: #cc0033;
            --white: #ffffff;
            --gray: #888888;
            --gray-dark: #333333;
            --green: #00ff88;
            --yellow: #ffcc00;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            font-family: 'Segoe UI', 'Courier New', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(255,0,64,0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255,0,64,0.03) 0%, transparent 50%);
        }

        .main-container {
            width: 100%;
            max-width: 520px;
        }

        /* HEADER */
        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header .logo-icon {
            font-size: 55px;
            animation: pulse 1.5s ease-in-out infinite;
            display: inline-block;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .header h1 {
            font-family: 'Courier New', monospace;
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 3px;
            color: #fff;
            text-shadow: 0 0 30px rgba(255,0,64,0.8);
            margin-top: 5px;
        }

        .header h1 span {
            color: var(--red);
        }

        .header .subtitle {
            color: var(--gray);
            font-size: 11px;
            letter-spacing: 2px;
            margin-top: 3px;
        }

        /* RESOLUSI BAR */
        .resolution-bar {
            background: var(--card);
            border: 1px solid var(--gray-dark);
            border-radius: 12px;
            padding: 12px 15px;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .resolution-bar .res-label {
            color: var(--red);
            font-weight: bold;
            font-size: 11px;
            letter-spacing: 1px;
            font-family: 'Courier New', monospace;
        }

        .res-option {
            padding: 8px 16px;
            background: transparent;
            border: 2px solid var(--gray-dark);
            border-radius: 25px;
            color: var(--gray);
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
            transition: all 0.3s ease;
            font-family: 'Courier New', monospace;
            letter-spacing: 1px;
        }

        .res-option:hover {
            border-color: var(--red);
            color: #fff;
        }

        .res-option.active {
            background: var(--red);
            border-color: var(--red);
            color: #fff;
            box-shadow: 0 0 20px rgba(255,0,64,0.4);
            animation: glowPulse 1.5s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%, 100% { box-shadow: 0 0 15px rgba(255,0,64,0.3); }
            50% { box-shadow: 0 0 30px rgba(255,0,64,0.7); }
        }

        /* CARD UTAMA */
        .card {
            background: var(--card);
            border: 2px solid var(--gray-dark);
            border-radius: 18px;
            padding: 22px;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--red), transparent);
            animation: borderShine 3s linear infinite;
        }

        @keyframes borderShine {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        /* INPUT LINK */
        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            color: var(--gray);
            font-size: 11px;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
            font-family: 'Courier New', monospace;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper input {
            width: 100%;
            padding: 14px 45px 14px 18px;
            background: #0d0d0d;
            border: 2px solid var(--gray-dark);
            border-radius: 12px;
            color: #fff;
            font-size: 13px;
            font-family: 'Courier New', monospace;
            outline: none;
            transition: all 0.3s;
        }

        .input-wrapper input:focus {
            border-color: var(--red);
            box-shadow: 0 0 20px rgba(255,0,64,0.15);
        }

        .input-wrapper input::placeholder {
            color: #444;
            font-size: 11px;
        }

        .input-wrapper .paste-btn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: var(--gray-dark);
            border: none;
            color: #aaa;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 11px;
            font-family: 'Courier New', monospace;
            transition: all 0.3s;
        }

        .input-wrapper .paste-btn:hover {
            background: var(--red);
            color: #fff;
        }

        /* CUSTOM NAME */
        .custom-name-input {
            margin-bottom: 15px;
        }

        .custom-name-input input {
            width: 100%;
            padding: 12px 15px;
            background: #0d0d0d;
            border: 2px solid var(--gray-dark);
            border-radius: 10px;
            color: #fff;
            font-size: 12px;
            font-family: 'Courier New', monospace;
            outline: none;
            transition: all 0.3s;
        }

        .custom-name-input input:focus {
            border-color: var(--yellow);
            box-shadow: 0 0 15px rgba(255,204,0,0.1);
        }

        .custom-name-input input::placeholder {
            color: #444;
        }

        /* PREVIEW BOX */
        .preview-box {
            width: 100%;
            aspect-ratio: 16/9;
            background: #0d0d0d;
            border: 2px dashed var(--gray-dark);
            border-radius: 12px;
            margin-bottom: 15px;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .preview-box.has-video {
            border: 2px solid var(--red);
            box-shadow: 0 0 25px rgba(255,0,64,0.2);
        }

        .preview-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .preview-box img.show {
            display: block;
        }

        .preview-box .placeholder {
            text-align: center;
            color: var(--gray-dark);
        }

        .preview-box .placeholder .icon {
            font-size: 50px;
            display: block;
            margin-bottom: 8px;
        }

        .preview-box .placeholder .text {
            font-size: 11px;
            letter-spacing: 1px;
            font-family: 'Courier New', monospace;
        }

        .preview-box .duration-badge {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.8);
            color: #fff;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-family: 'Courier New', monospace;
            display: none;
        }

        .preview-box .duration-badge.show {
            display: block;
        }

        /* TYPE SELECTOR */
        .type-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .type-btn {
            flex: 1;
            padding: 14px;
            background: #0d0d0d;
            border: 2px solid var(--gray-dark);
            border-radius: 10px;
            color: var(--gray);
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            font-family: 'Courier New', monospace;
            letter-spacing: 1px;
            transition: all 0.3s;
            text-align: center;
        }

        .type-btn:hover {
            border-color: #fff;
            color: #fff;
        }

        .type-btn.active {
            background: var(--red);
            border-color: var(--red);
            color: #fff;
            box-shadow: 0 0 25px rgba(255,0,64,0.4);
        }

        .type-btn .emoji {
            display: block;
            font-size: 22px;
            margin-bottom: 4px;
        }

        /* DOWNLOAD BUTTON */
        .download-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--red), var(--red-dark));
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            letter-spacing: 2px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .download-btn:hover {
            box-shadow: 0 0 40px rgba(255,0,64,0.6);
            transform: translateY(-2px);
        }

        .download-btn:active {
            transform: scale(0.96);
        }

        .download-btn:disabled {
            background: var(--gray-dark);
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        .download-btn .btn-loader {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid #fff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* STATUS */
        .status-msg {
            text-align: center;
            margin-top: 12px;
            padding: 10px;
            border-radius: 8px;
            font-size: 12px;
            font-family: 'Courier New', monospace;
            display: none;
        }

        .status-msg.show {
            display: block;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .status-msg.success {
            background: rgba(0,255,136,0.1);
            border: 1px solid rgba(0,255,136,0.3);
            color: var(--green);
        }

        .status-msg.error {
            background: rgba(255,0,64,0.1);
            border: 1px solid rgba(255,0,64,0.3);
            color: var(--red);
        }

        .status-msg.info {
            background: rgba(255,204,0,0.1);
            border: 1px solid rgba(255,204,0,0.3);
            color: var(--yellow);
        }

        /* FOOTER */
        .footer {
            text-align: center;
            margin-top: 20px;
            color: #333;
            font-size: 10px;
            letter-spacing: 1.5px;
            font-family: 'Courier New', monospace;
        }

        .footer span {
            color: var(--red);
            font-weight: bold;
        }

        /* RESPONSIVE */
        @media (max-width: 400px) {
            .header h1 {
                font-size: 18px;
                letter-spacing: 1px;
            }
            .resolution-bar {
                gap: 5px;
                padding: 10px;
            }
            .res-option {
                padding: 6px 12px;
                font-size: 10px;
            }
            .type-btn {
                padding: 10px;
                font-size: 12px;
            }
            .type-btn .emoji {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <!-- HEADER -->
        <div class="header">
            <div class="logo-icon">💀</div>
            <h1>DARKAI <span>TOOLS</span> DOWNLOADER</h1>
            <p class="subtitle">TikTok • No Watermark • HD</p>
        </div>

        <!-- RESOLUSI SELECTOR -->
        <div class="resolution-bar">
            <span class="res-label">⚡ RESOLUSI</span>
            <button class="res-option active" data-res="480p" onclick="setResolution('480p', this)">480p</button>
            <button class="res-option" data-res="720p" onclick="setResolution('720p', this)">720p</button>
            <button class="res-option" data-res="1080p" onclick="setResolution('1080p', this)">1080p</button>
            <span class="res-label">•</span>
        </div>

        <!-- CARD UTAMA -->
        <div class="card">
            <!-- INPUT LINK -->
            <div class="input-group">
                <label>🔗 MASUKKAN LINK VIDEO</label>
                <div class="input-wrapper">
                    <input type="text" id="urlInput" placeholder="https://vt.tiktok.com/... atau https://www.tiktok.com/...">
                    <button class="paste-btn" onclick="pasteFromClipboard()">📋 PASTE</button>
                </div>
            </div>

            <!-- CUSTOM NAME -->
            <div class="custom-name-input">
                <input type="text" id="customName" placeholder="✏️ Custom nama file (opsional)">
            </div>

            <!-- PREVIEW VIDEO -->
            <div class="preview-box" id="previewBox">
                <img id="previewImg" src="" alt="Preview">
                <div class="placeholder" id="placeholder">
                    <span class="icon">🎬</span>
                    <span class="text">PREVIEW VIDEO</span>
                </div>
                <span class="duration-badge" id="durationBadge"></span>
            </div>

            <!-- TYPE SELECTOR -->
            <div class="type-selector">
                <button class="type-btn active" id="btnMp4" onclick="setType('mp4')">
                    <span class="emoji">📹</span> MP4
                </button>
                <button class="type-btn" id="btnMp3" onclick="setType('mp3')">
                    <span class="emoji">🎵</span> MP3
                </button>
            </div>

            <!-- DOWNLOAD BUTTON -->
            <button class="download-btn" id="btnDownload" onclick="startDownload()">
                ⬇ DOWNLOAD
            </button>

            <!-- STATUS -->
            <div class="status-msg" id="statusMsg"></div>
        </div>

        <!-- FOOTER -->
        <div class="footer">
            Powered by <span>Dark AI</span> | Bos Alby 😈 | v2.0
        </div>
    </div>

    <script>
        // ============ STATE ============
        let selectedResolution = '720p'; // Default
        let selectedType = 'mp4';
        let currentVideoData = null;

        const API_BASE = 'https://www.tikwm.com/api/';

        // ============ FUNCTIONS ============

        function setResolution(res, btn) {
            selectedResolution = res;
            document.querySelectorAll('.res-option').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            // Update quality jika ada data
            if (currentVideoData) {
                updatePreviewForResolution();
            }
        }

        function setType(type) {
            selectedType = type;
            document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
            
            if (type === 'mp4') {
                document.getElementById('btnMp4').classList.add('active');
            } else {
                document.getElementById('btnMp3').classList.add('active');
            }
        }

        function showStatus(type, msg) {
            const status = document.getElementById('statusMsg');
            status.className = 'status-msg show ' + type;
            status.textContent = msg;

            if (type === 'success' || type === 'error') {
                setTimeout(() => {
                    status.classList.remove('show');
                }, 5000);
            }
        }

        function updatePreviewForResolution() {
            if (!currentVideoData) return;

            const img = document.getElementById('previewImg');
            let coverUrl = '';
            
            // Cover berdasarkan resolusi
            switch(selectedResolution) {
                case '1080p':
                    coverUrl = currentVideoData.origin_cover || currentVideoData.cover || '';
                    break;
                case '720p':
                    coverUrl = currentVideoData.cover || currentVideoData.origin_cover || '';
                    break;
                case '480p':
                    coverUrl = currentVideoData.dynamic_cover || currentVideoData.cover || '';
                    break;
                default:
                    coverUrl = currentVideoData.cover || '';
            }

            if (coverUrl) {
                img.src = coverUrl;
                img.classList.add('show');
                document.getElementById('placeholder').style.display = 'none';
                document.getElementById('previewBox').classList.add('has-video');
                
                // Tampilkan durasi
                const duration = currentVideoData.duration || 0;
                const badge = document.getElementById('durationBadge');
                badge.textContent = `⏱ ${duration}s | ${selectedResolution}`;
                badge.classList.add('show');
            }
        }

        async function pasteFromClipboard() {
            try {
                const text = await navigator.clipboard.readText();
                if (text) {
                    document.getElementById('urlInput').value = text;
                    showStatus('success', '📋 Link kepaste! Klik DOWNLOAD aja Bos 😎');
                    
                    // Auto fetch preview
                    if (text.includes('tiktok.com') || text.includes('tiktok')) {
                        await fetchPreview(text);
                    }
                }
            } catch(e) {
                showStatus('error', '❌ Gagal akses clipboard, paste manual aja Bos 🥺');
            }
        }

        async function fetchPreview(url) {
            try {
                showStatus('info', '🔍 Ngambil preview video...');
                
                const response = await fetch(`${API_BASE}?url=${encodeURIComponent(url)}`);
                const data = await response.json();

                if (data.code === 0 && data.data) {
                    currentVideoData = data.data;
                    updatePreviewForResolution();
                    showStatus('success', '✅ Video ditemukan! Pilih resolusi & tipe, lalu DOWNLOAD 😎');
                } else {
                    showStatus('error', '❌ Video gak ditemukan, cek link lagi Bos!');
                }
            } catch(e) {
                showStatus('error', '❌ Gagal fetch data: ' + e.message);
            }
        }

        async function startDownload() {
            const url = document.getElementById('urlInput').value.trim();
            const customName = document.getElementById('customName').value.trim();
            const btn = document.getElementById('btnDownload');

            // Validasi
            if (!url) {
                showStatus('error', '⚠️ LINK KOSONG ANJG! Isi dulu 🥺💀');
                return;
            }

            if (!url.includes('tiktok.com') && !url.includes('tiktok')) {
                showStatus('error', '⚠️ BUKAN LINK TIKTOK! Yang bener dong Bos 😭');
                return;
            }

            // Disable button
            btn.disabled = true;
            btn.innerHTML = '<div class="btn-loader"></div>';

            try {
                // Fetch data kalo belum ada
                if (!currentVideoData) {
                    showStatus('info', '🔍 Ngambil data video...');
                    const response = await fetch(`${API_BASE}?url=${encodeURIComponent(url)}`);
                    const data = await response.json();
                    
                    if (data.code !== 0 || !data.data) {
                        throw new Error('Video gak ditemukan');
                    }
                    currentVideoData = data.data;
                    updatePreviewForResolution();
                }

                // Tentukan URL download berdasarkan tipe dan resolusi
                let downloadUrl;
                let extension;
                const vData = currentVideoData;

                if (selectedType === 'mp3') {
                    downloadUrl = vData.music || (vData.music_info || {}).play || '';
                    extension = 'mp3';
                    if (!downloadUrl) throw new Error('Audio gak tersedia untuk video ini 😢');
                } else {
                    // MP4 berdasarkan resolusi
                    switch(selectedResolution) {
                        case '1080p':
                            downloadUrl = vData.hdplay || vData.play || vData.wmplay || '';
                            break;
                        case '720p':
                            downloadUrl = vData.play || vData.hdplay || vData.wmplay || '';
                            break;
                        case '480p':
                            downloadUrl = vData.wmplay || vData.play || vData.hdplay || '';
                            break;
                        default:
                            downloadUrl = vData.play || vData.hdplay || vData.wmplay || '';
                    }
                    extension = 'mp4';
                    if (!downloadUrl) throw new Error('Video gak tersedia di resolusi ini 😢');
                }

                // Siapin nama file
                let fileName;
                if (customName) {
                    fileName = customName.replace(/[<>:"/\\|?*]/g, '').trim() || 'dark_download';
                } else {
                    const author = (vData.author?.unique_id || vData.author?.nickname || 'unknown')
                        .replace(/[^a-zA-Z0-9\-_]/g, '');
                    const title = (vData.title || 'tiktok')
                        .substring(0, 30)
                        .replace(/[^a-zA-Z0-9\-_ ]/g, '')
                        .trim()
                        .replace(/\s+/g, '_');
                    fileName = `${author}_${title}_${selectedResolution}`;
                }
                fileName += '.' + extension;

                // Download
                showStatus('info', `📥 Downloading ${fileName} (${selectedResolution})...`);

                const blob = await fetch(downloadUrl).then(r => r.blob());
                
                // Trigger download
                const blobUrl = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = blobUrl;
                a.download = fileName;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(blobUrl);

                // Sukses
                const sizeMB = (blob.size / (1024 * 1024)).toFixed(1);
                showStatus('success', `✅ BERHASIL! ${fileName} (${sizeMB}MB) tersimpan! Cek folder Download 😎🔥`);

            } catch(err) {
                showStatus('error', `❌ GAGAL: ${err.message} 💀`);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '⬇ DOWNLOAD';
            }
        }

        // ============ EVENT LISTENERS ============

        // Enter key
        document.getElementById('urlInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                startDownload();
            }
        });

        // Auto fetch preview saat URL berubah
        let fetchTimeout;
        document.getElementById('urlInput').addEventListener('input', function() {
            clearTimeout(fetchTimeout);
            const url = this.value.trim();
            if (url.includes('tiktok.com') || url.includes('tiktok')) {
                fetchTimeout = setTimeout(() => fetchPreview(url), 800);
            }
        });

        // Auto paste on load
        window.addEventListener('load', async () => {
            try {
                const text = await navigator.clipboard.readText();
                if (text && (text.includes('tiktok.com') || text.includes('tiktok'))) {
                    document.getElementById('urlInput').value = text;
                    await fetchPreview(text);
                    showStatus('success', '📋 Link auto-paste dari clipboard! Tinggal DOWNLOAD 😎');
                    setTimeout(() => {
                        document.getElementById('statusMsg').classList.remove('show');
                    }, 3000);
                }
            } catch(e) {}
        });

        // Log keren
        console.log('%c💀 DARKAI TOOLS DOWNLOADER %cv2.0',
            'color:#ff0040;font-size:20px;font-weight:bold;',
            'color:#fff;');
        console.log('%c🔥 Made for %cBos Alby %c😈',
            'color:#ffcc00;', 'color:#ff0040;font-weight:bold;', 'color:#fff;');
        console.log('%c📁 Save: %c/sdcard/Download/',
            'color:#00ff88;', 'color:#fff;');
    </script>
</body>
</html>
